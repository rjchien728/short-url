name: short-url

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    image: short-url-api:latest
    env_file: ../.env
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    image: short-url-worker:latest
    env_file: ../.env
    restart: unless-stopped
